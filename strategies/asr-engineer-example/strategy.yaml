# 策略:ASR 算法工程师寻访(示例,由已发布的 ASR 岗解析而来)
name: asr-engineer
mode: once                       # 现阶段:单次 + 手动触发
linked_job: 语音识别(ASR)算法工程师   # 已发布的在线职位,推荐通道按它匹配

hard_filters:
  city: 深圳                      # ⚠ 必须显式!搜索页先清默认预选再设此城市
  degree: 本科及以上
  experience: 3-10年

keywords:                        # 关键词矩阵,搜索通道每轮轮换一组
  - [语音识别, ASR, 语音算法]
  - [会议转写, 实时字幕, 说话人分离]
  - [FunASR, WeNet, Kaldi, ESPnet]
  - [端侧语音, 端到端语音, 语音唤醒]

target_companies: [目标公司A, 目标公司B, 目标公司C]   # 命中加分,非硬过滤;换成你真实想挖的公司名

rubric:
  # 2026-07-04 调优:原 must 仅"识别"过窄。JD=会议转写系统,前端声学(远场/降噪/阵列/波束成形/说话人分离)
  # 是会议转写的核心一半,应计入。放宽 must 为"语音/声学算法实战",识别 vs 前端在 nice 里区分权重。
  must:                          # 缺一 → 封顶 B
    - 3年以上语音/声学算法实战经验(ASR识别 或 会议前端声学 任一)
    - 掌握端到端语音识别原理 或 阵列/声学信号处理(会议前端)
  nice:                          # 命中加分
    - 端侧模型部署/推理优化
    - 会议转写 / 实时字幕 / 说话人分离 落地
    - 熟悉 FunASR/WeNet/Kaldi/ESPnet
    - 智能硬件 / 可穿戴音频 背景
  reject:                        # 命中 → 直接 C 淘汰
    - 纯学术无工程落地
    - 仅语音合成(TTS)无识别
    - 期望城市与深圳完全不符且不接受 relocate

touch_policy: full               # 用户设定:A 档自动 打招呼 + 求简历
                                 # (换电话/换微信/约面 仍不自动,只报告建议)

budget:
  greets_per_day: 15             # 当日打招呼上限(账号总额 200/天)
  chat_cards: 12                 # 本策略可消耗搜索畅聊卡上限(每次"开聊"=消耗3张,≈4次开聊);逐张记账、超停。
  authorize_card_pii_bundle: true  # 🔴chat_cards>0 必须显式=true 才允许开聊:开聊会自动"索要简历/微信/电话"=PII捆绑(碰红线)。validate.py 强制校验;这就是 §1规则7"用户授权过畅聊卡"的机检定义。示例:填 true 表示你已知情"开聊会自动索要简历/微信/电话"并授权;没授权就把 chat_cards 设 0。
  detail_views_per_run: 40
  base_salary_range: [30, 50]    # 岗位基准薪资 K(从 linked_job 的 JD 提取);薪资破格框架用,缺失则报告要用户给
  salary_flexibility_pct: 15     # 预算弹性 0-50(推荐15-25):base_max×(1+pct%)=破格谈薪上限(50→57.5K)

target_qualified: 10             # 攒够 10 个合格候选人算这个策略够了

# ── 运营智能层(第二代能力,三把独立开关默认全关;逐个翻 true 上线,出问题单独关回)见 playbook §11 ──
intelligence:
  custom_greetings:              # (1)定制招呼语:A 档用 LLM 引背景生成 ≤30 字,替代系统模板
    enabled: false               # 安全默认关;true 才生成(直接产外发文案)
    mode: context_aware          # default(系统语)| context_aware(LLM 逐人)
    tiers: [A]                   # 哪些档给定制语(A* 破格候选授权时临时并入)
    max_chars: 30                # 硬字数上限,越界即 fallback default
    require_user_confirmation: true   # 红线:外发必审(逐条 Y/N/编辑),恒 true 不可关
  feedback:                      # (2)当日反馈环:扫回执→对比基线→诊断→(仅疑似风控)自动停手
    enabled: false               # 关时 Step 6.5 跳过
    baseline: { reply_rate: 0.40, read_rate: 0.60, card_conversion_rate: 0.25 }
    thresholds: { low_reply_delta: -0.20, no_reply_streak_stop: 5, min_samples_for_diagnosis: 3 }
    action: { on_low_reply: report, on_suspected_throttle: stop_and_cool, cooldown_hours: 24 }
  salary_leverage:               # (3)薪资破格:超带候选从"即刻封B"改为"评稀缺度→可破格,给定量建议"
    enabled: false               # 关时 §4 rule 4 走旧逻辑(超带即封 B)
    scarcity_threshold: 7.5      # 稀缺度 ≥ 此值 且 超带,才建议破格标 A*_salary_sensitive
    break_glass_mode: manual     # manual(每个 A* 都要用户勾同意)| auto(慎用)
  card_prescreen:                # (4)花卡前质量预判:搜索畅聊卡(3卡/次)开聊前先免费打质量分,别冲动开卡
    enabled: true                # 默认开(只减少花卡、零外发,越保护越好);见 §11.4
    min_score: 6                 # 质量分≥此值才建议开卡;3-6 报告待定;<3 不建议

# shared_ledger: strategies/_shared/ledger.jsonl   # (可选)多岗/多策略共享账本,防跨岗重复触达,见 playbook §12;不设=各用各的

# 心跳字段(阶段三才启用,现留白)
schedule:
  cadence: null
  stop_when: 合格满 target_qualified 或 30 天
